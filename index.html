<!DOCTYPE html>
<html>

<head>
<title> AI Chat</title>
</head>

<body>

<h2>AI Chat</h2>

<div id="chat"></div>

<br>

<input id="userInput" placeholder="Ask something">
<button onclick="sendMessage()">Send</button>

<script>

const API_KEY = "";

const chat = document.getElementById("chat");

/* GIVEN PROMPT */
const SYSTEM_PROMPT =
"You are my personal assistant managing deadlines and submissions for my project";

function addMessage(text, sender){

const p = document.createElement("p");

if(sender === "user"){
p.innerHTML = "<b>You:</b> " + text;
}
else{
p.innerHTML = "<b>AI:</b> " + text;
}

chat.appendChild(p);

}

async function sendMessage(){

const input = document.getElementById("userInput");
const text = input.value.trim();

if(text === "") return;

addMessage(text,"user");

input.value = "";

const prompt = SYSTEM_PROMPT + "\nUser: " + text;

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{ text: prompt }
]
}
]
})
}
);

const data = await response.json();

const reply = data.candidates[0].content.parts[0].text;

addMessage(reply,"ai");

}
catch(error){

addMessage("Error connecting to AI","ai");

}

}

</script>

</body>

</html>
